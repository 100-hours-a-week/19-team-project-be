name: Backend System Rollback

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Operation mode'
        required: true
        type: choice
        options:
          - list
          - rollback
        default: 'list'
      image_tag:
        description: 'Image tag to rollback to (required if mode=rollback)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: List available image tags
        if: inputs.mode == 'list'
        id: list-images
        run: |
          REPO="${{ secrets.ECR_REPOSITORY_BACKEND }}"
          echo "Available backend images (latest 20):"
          aws ecr describe-images \
            --repository-name "$REPO" \
            --query 'sort_by(imageDetails,&imagePushedAt)[-20:].[imageTags[0],imagePushedAt]' \
            --output table \
            --region ${{ secrets.AWS_REGION }} || echo "No images found"

      - name: Verify image exists
        if: inputs.mode == 'rollback'
        id: verify-image
        run: |
          REPO="${{ secrets.ECR_REPOSITORY_BACKEND }}"
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            echo "Error: image_tag is required for rollback"
            exit 1
          fi
          aws ecr describe-images \
            --repository-name "$REPO" \
            --image-ids imageTag="$TAG" \
            --region ${{ secrets.AWS_REGION }} > /dev/null 2>&1 || {
            echo "Error: Image tag not found: $REPO:$TAG"
            exit 1
          }
          echo "Image verified"

      - name: Create CodeDeploy revision and rollback
        if: inputs.mode == 'rollback'
        id: rollback-deploy
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.CODEDEPLOY_REVISION_BUCKET }}
          APP_NAME: ${{ secrets.CODEDEPLOY_APP_NAME }}
          DG_NAME: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}
          RUNTIME_ENV: ${{ secrets.RUNTIME_ENV_FILE }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e
          ECR_REGISTRY=$(aws ecr describe-repositories \
            --repository-names "${ECR_REPOSITORY}" \
            --query 'repositories[0].repositoryUri' \
            --output text | sed 's|/.*||')

          REVISION_DIR="${GITHUB_WORKSPACE}/.codedeploy-revision"
          rm -rf "$REVISION_DIR" && mkdir -p "$REVISION_DIR"
          cp appspec.yml "$REVISION_DIR/"
          mkdir -p "$REVISION_DIR/scripts/codedeploy"
          cp scripts/codedeploy/deploy.sh "$REVISION_DIR/scripts/codedeploy/"

          envsubst '${ECR_REGISTRY} ${ECR_REPOSITORY} ${IMAGE_TAG}' \
            < docker-compose.yml > "$REVISION_DIR/docker-compose.yml"

          printf 'ECR_REGISTRY=%s\nAWS_REGION=%s\n' "${ECR_REGISTRY}" "${AWS_REGION}" \
            > "$REVISION_DIR/.env"

          printf '%s' "${RUNTIME_ENV}" > "$REVISION_DIR/refit.env"
          cp otel-agent-config.yaml "$REVISION_DIR/otel-agent-config.yaml"

          mkdir -p "$REVISION_DIR/firebase"
          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" > "$REVISION_DIR/firebase/refit-fcm.json"

          ZIP_KEY="backend/rollback-$(date +%Y%m%d%H%M%S).zip"
          (cd "$REVISION_DIR" && zip -r -q "../rollback.zip" .)
          aws s3 cp "${GITHUB_WORKSPACE}/rollback.zip" "s3://${S3_BUCKET}/${ZIP_KEY}"
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DG_NAME" \
            --s3-location bucket="${S3_BUCKET}",key="${ZIP_KEY}",bundleType=zip \
            --query 'deploymentId' --output text)
          echo "deployment_id=${DEPLOY_ID}" >> $GITHUB_OUTPUT

      - name: Wait for CodeDeploy
        if: inputs.mode == 'rollback'
        id: wait-deploy
        run: |
          DEPLOY_ID="${{ steps.rollback-deploy.outputs.deployment_id }}"
          echo "배포 ID: $DEPLOY_ID — 폴링 시작 (최대 15분)"
          for i in $(seq 1 30); do
            STATUS=$(aws deploy get-deployment \
              --deployment-id "$DEPLOY_ID" \
              --query 'deploymentInfo.status' \
              --output text --region "${{ secrets.AWS_REGION }}")
            echo "  [$i/30] 상태: $STATUS"
            case "$STATUS" in
              Succeeded)
                echo "deploy_status=Succeeded" >> $GITHUB_OUTPUT
                exit 0 ;;
              Failed|Stopped)
                ERROR=$(aws deploy get-deployment \
                  --deployment-id "$DEPLOY_ID" \
                  --query 'deploymentInfo.errorInformation.message' \
                  --output text --region "${{ secrets.AWS_REGION }}" 2>/dev/null || echo "N/A")
                echo "deploy_status=${STATUS}" >> $GITHUB_OUTPUT
                echo "deploy_error=${ERROR}" >> $GITHUB_OUTPUT
                exit 1 ;;
            esac
            sleep 30
          done
          echo "deploy_status=Timeout" >> $GITHUB_OUTPUT
          echo "deploy_error=15분 내 완료되지 않음" >> $GITHUB_OUTPUT
          exit 1

      - name: Discord notification
        if: always() && inputs.mode == 'rollback'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOY_ID: ${{ steps.rollback-deploy.outputs.deployment_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          COLOR=$([ "$STATUS" = "success" ] && echo "3066993" || echo "15158332")
          payload=$(cat <<EOF
          {"embeds":[{"title":"BE 롤백: $STATUS","color":$COLOR,"fields":[{"name":"이미지 태그","value":"\`$IMAGE_TAG\`","inline":true},{"name":"CodeDeploy ID","value":"\`$DEPLOY_ID\`","inline":true},{"name":"워크플로우","value":"[상세](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})","inline":false}],"footer":{"text":"Re-Fit"},"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}]}
          EOF
          )
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK" || true
