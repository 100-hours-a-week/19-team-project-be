name: Backend System Rollback

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Operation mode'
        required: true
        type: choice
        options:
          - list
          - rollback
        default: 'list'
      image_tag:
        description: 'Image tag to rollback to (required if mode=rollback)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: List available image tags
        if: inputs.mode == 'list'
        id: list-images
        run: |
          REPO="${{ secrets.ECR_REPOSITORY_BACKEND }}"
          echo "Available backend images (latest 20):"
          aws ecr describe-images \
            --repository-name "$REPO" \
            --query 'sort_by(imageDetails,&imagePushedAt)[-20:].[imageTags[0],imagePushedAt]' \
            --output table \
            --region ${{ secrets.AWS_REGION }} || echo "No images found"

      - name: Verify image exists
        if: inputs.mode == 'rollback'
        id: verify-image
        run: |
          REPO="${{ secrets.ECR_REPOSITORY_BACKEND }}"
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            echo "Error: image_tag is required for rollback"
            exit 1
          fi
          aws ecr describe-images \
            --repository-name "$REPO" \
            --image-ids imageTag="$TAG" \
            --region ${{ secrets.AWS_REGION }} > /dev/null 2>&1 || {
            echo "Error: Image tag not found: $REPO:$TAG"
            exit 1
          }
          echo "Image verified: $REPO:$TAG"

      - name: Create CodeDeploy revision and rollback
        if: inputs.mode == 'rollback'
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          S3_BUCKET: ${{ secrets.CODEDEPLOY_REVISION_BUCKET }}
          APP_NAME: ${{ secrets.CODEDEPLOY_APP_NAME }}
          DG_NAME: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}
          COMPOSE_ENV_BASE: ${{ secrets.COMPOSE_ENV_FILE }}
        run: |
          set -e
          # ECR 레지스트리 동적 조회 (credentials 노출 방지)
          REGISTRY=$(aws ecr describe-repositories --repository-names ${{ secrets.ECR_REPOSITORY_BACKEND }} --query 'repositories[0].repositoryUri' --output text | sed 's|/.*||')
          REVISION_DIR="${GITHUB_WORKSPACE}/.codedeploy-revision"
          rm -rf "$REVISION_DIR" && mkdir -p "$REVISION_DIR"
          cp appspec.yml "$REVISION_DIR/"
          mkdir -p "$REVISION_DIR/scripts/codedeploy"
          cp scripts/codedeploy/deploy.sh "$REVISION_DIR/scripts/codedeploy/"
          cp docker-compose.yml "$REVISION_DIR/"
          # .env 파일 생성: 기본 내용 + 동적 값들
          if [ -n "$COMPOSE_ENV_BASE" ]; then
            echo "$COMPOSE_ENV_BASE" > "$REVISION_DIR/.env"
          else
            touch "$REVISION_DIR/.env"
          fi
          # 동적 값들 추가/덮어쓰기
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$REVISION_DIR/.env"
          echo "ECR_REGISTRY=${REGISTRY}" >> "$REVISION_DIR/.env"
          echo "ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY_BACKEND }}" >> "$REVISION_DIR/.env"
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> "$REVISION_DIR/.env"
          ZIP_KEY="backend/rollback-$(date +%Y%m%d%H%M%S).zip"
          (cd "$REVISION_DIR" && zip -r -q "../rollback.zip" .)
          aws s3 cp "${GITHUB_WORKSPACE}/rollback.zip" "s3://${S3_BUCKET}/${ZIP_KEY}"
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DG_NAME" \
            --s3-location bucket="${S3_BUCKET}",key="${ZIP_KEY}",bundleType=zip \
            --query 'deploymentId' --output text)
          echo "Rollback deployment started: $DEPLOY_ID"
          echo "deployment_id=${DEPLOY_ID}" >> $GITHUB_OUTPUT

      - name: Discord notification
        if: always() && inputs.mode == 'rollback'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOY_ID: ${{ steps.verify-image.outputs.deployment_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          COLOR=$([ "$STATUS" = "success" ] && echo "3066993" || echo "15158332")
          payload=$(cat <<EOF
          {"embeds":[{"title":"BE Rollback: $STATUS","color":$COLOR,"fields":[{"name":"Image Tag","value":"\`$IMAGE_TAG\`","inline":true},{"name":"Workflow","value":"[Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})","inline":false}],"footer":{"text":"Re-Fit"},"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}]}
          EOF
          )
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK" || true
