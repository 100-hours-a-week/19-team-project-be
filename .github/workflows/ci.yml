name: Re-Fit Backend CI

on:
  pull_request:
    branches: [refactor/v2-ci-cd]
    types: [opened, synchronize, reopened]
  push:
    branches: [refactor/v2-ci-cd]
  workflow_dispatch:
    inputs:
      job_to_run:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - lint-and-test
          - integration
          - release-dev
          - release-prod
          - all

env:
  JAVA_VERSION: 21
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

permissions:
  contents: write

jobs:
  lint-and-test:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_to_run == 'lint-and-test')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: refit-backend
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile check
        run: ./gradlew compileJava --no-daemon

      - name: Build check
        run: |
          set -e
          ./gradlew bootJar --no-daemon
          if [ ! -f "build/libs/refit-backend-0.0.1-SNAPSHOT.jar" ]; then
            echo "Error: JAR file not found"
            exit 1
          fi
          ls -lh build/libs/*.jar | head -1

  integration:
    if: |
      (github.event_name == 'push' && github.ref_name == 'refactor/v2-ci-cd') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.job_to_run == 'integration' ||
        github.event.inputs.job_to_run == 'release-dev' ||
        github.event.inputs.job_to_run == 'all'
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: refit-backend
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Security scan
        run: |
          ./gradlew dependencies --no-daemon > dependencies.txt 2>&1 || true
          if grep -iE "(vulnerability|CVE|security|deprecated|unsafe)" dependencies.txt 2>/dev/null; then
            echo "Warning: Potential security issues detected"
            grep -iE "(vulnerability|CVE|security|deprecated|unsafe)" dependencies.txt | head -20
          else
            echo "No obvious security vulnerabilities detected"
          fi
        continue-on-error: true

  release-dev:
    needs: [integration]
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'release-dev' || github.event.inputs.job_to_run == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: refit-backend
        run: chmod +x gradlew

      - name: Build JAR
        working-directory: refit-backend
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          IMAGE_TAG="develop-${SHA_SHORT}"
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${IMAGE_TAG}"
          LATEST_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:develop-latest"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "latest_image=${LATEST_IMAGE}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: refit-backend
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ steps.meta.outputs.latest_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64

      - name: Trigger CD-Dev workflow
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd-dev.yml',
              ref: 'refactor/v2-ci-cd',
              inputs: {
                image_tag: '${{ steps.meta.outputs.image_tag }}',
                sha: '${{ github.sha }}',
                run_id: '${{ github.run_id }}'
              }
            });
            console.log('CD-Dev workflow triggered successfully');

  release-prod:
    if: |
      (github.event_name == 'push' && github.ref_name == 'refactor/v2-ci-cd') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'release-prod' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Inject production secrets
        working-directory: refit-backend
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_SECRET_YML_PROD }}" > src/main/resources/application-secret.yml

      - name: Build JAR
        working-directory: refit-backend
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Generate image tag
        id: image-tag
        run: echo "tag=production-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: refit-backend
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ steps.image-tag.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:production-latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create CodeDeploy revision and deploy
        id: codedeploy
        working-directory: ${{ github.workspace }}
        env:
          S3_BUCKET: ${{ secrets.CODEDEPLOY_REVISION_BUCKET }}
          APP_NAME: ${{ secrets.CODEDEPLOY_APP_NAME }}
          DG_NAME: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}
          RUNTIME_ENV: ${{ secrets.RUNTIME_ENV_FILE }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -e
          REVISION_DIR="${GITHUB_WORKSPACE}/.codedeploy-revision"
          rm -rf "$REVISION_DIR" && mkdir -p "$REVISION_DIR"
          cp appspec.yml "$REVISION_DIR/"
          mkdir -p "$REVISION_DIR/scripts/codedeploy"
          cp scripts/codedeploy/deploy.sh "$REVISION_DIR/scripts/codedeploy/"

          envsubst '${ECR_REGISTRY} ${ECR_REPOSITORY} ${IMAGE_TAG}' \
            < docker-compose.yml > "$REVISION_DIR/docker-compose.yml"

          printf 'ECR_REGISTRY=%s\nAWS_REGION=%s\n' "${ECR_REGISTRY}" "${AWS_REGION}" \
            > "$REVISION_DIR/.env"

          printf '%s' "${RUNTIME_ENV}" > "$REVISION_DIR/refit.env"
          cp otel-agent-config.yaml "$REVISION_DIR/otel-agent-config.yaml"

          # Firebase 서비스 계정 키 주입
          mkdir -p "$REVISION_DIR/firebase"
          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" > "$REVISION_DIR/firebase/refit-fcm.json"

          ZIP_KEY="backend/${GITHUB_SHA}.zip"
          (cd "$REVISION_DIR" && zip -r -q "../${GITHUB_SHA}.zip" .)
          aws s3 cp "${GITHUB_WORKSPACE}/${GITHUB_SHA}.zip" "s3://${S3_BUCKET}/${ZIP_KEY}"
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DG_NAME" \
            --s3-location bucket="${S3_BUCKET}",key="${ZIP_KEY}",bundleType=zip \
            --query 'deploymentId' --output text)
          echo "Deployment started: $DEPLOY_ID"
          echo "deploy_id=${DEPLOY_ID}" >> $GITHUB_OUTPUT

      - name: Wait for CodeDeploy
        id: wait-deploy
        run: |
          DEPLOY_ID="${{ steps.codedeploy.outputs.deploy_id }}"
          echo "Deployment ID: $DEPLOY_ID — polling (max 10min)"
          for i in $(seq 1 30); do
            STATUS=$(aws deploy get-deployment \
              --deployment-id "$DEPLOY_ID" \
              --query 'deploymentInfo.status' \
              --output text --region "${{ secrets.AWS_REGION }}")
            echo "  [$i/30] status: $STATUS"
            case "$STATUS" in
              Succeeded)
                echo "deploy_status=Succeeded" >> $GITHUB_OUTPUT
                exit 0 ;;
              Failed|Stopped)
                ERROR=$(aws deploy get-deployment \
                  --deployment-id "$DEPLOY_ID" \
                  --query 'deploymentInfo.errorInformation.message' \
                  --output text --region "${{ secrets.AWS_REGION }}" 2>/dev/null || echo "N/A")
                echo "deploy_status=${STATUS}" >> $GITHUB_OUTPUT
                echo "deploy_error=${ERROR}" >> $GITHUB_OUTPUT
                exit 1 ;;
            esac
            sleep 15
          done
          echo "deploy_status=Timeout" >> $GITHUB_OUTPUT
          echo "deploy_error=Timed out after 10 minutes" >> $GITHUB_OUTPUT
          exit 1

      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
          DEPLOY_ID: ${{ steps.codedeploy.outputs.deploy_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          SHA_SHORT="${GITHUB_SHA::7}"
          COLOR=$([ "$STATUS" = "success" ] && echo "3066993" || echo "15158332")
          payload=$(cat <<EOF
          {"embeds":[{"title":"BE 배포(Prod): $STATUS","color":$COLOR,"fields":[{"name":"이미지 태그","value":"\`$IMAGE_TAG\`","inline":true},{"name":"커밋 SHA","value":"\`$SHA_SHORT\`","inline":true},{"name":"CodeDeploy ID","value":"\`$DEPLOY_ID\`","inline":true},{"name":"워크플로우","value":"[상세](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})","inline":false}],"footer":{"text":"Re-Fit"},"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}]}
          EOF
          )
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK" || true
