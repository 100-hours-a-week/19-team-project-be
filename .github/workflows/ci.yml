name: Re-Fit Backend CI

on:
  pull_request:
    branches: [refactor/v2-ci-cd]
    types: [opened, synchronize, reopened]
  push:
    branches: [refactor/v2-ci-cd]
  workflow_dispatch:
    inputs:
      job_to_run:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - lint-and-test
          - integration
          - release-dev
          - release-prod
          - all

env:
  JAVA_VERSION: 21
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

permissions:
  contents: write

jobs:
  # PR 검증: 컴파일 체크
  # 목적: 빠른 피드백을 통한 코드 품질 검증
  lint-and-test:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_to_run == 'lint-and-test')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: refit-backend
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile Check
        run: ./gradlew compileJava --no-daemon

      - name: Build Check
        run: |
          set -e
          ./gradlew bootJar --no-daemon
          if [ ! -f "build/libs/refit-backend-0.0.1-SNAPSHOT.jar" ]; then
            echo "Error: JAR file not found"
            exit 1
          fi
          ls -lh build/libs/*.jar | head -1

  # 통합 검증: 브랜치 빌드 검증 및 보안 스캔
  integration:
    if: |
      (github.event_name == 'push' && github.ref_name == 'refactor/v2-ci-cd') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_to_run == 'integration')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: refit-backend
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Security Scan
        run: |
          ./gradlew dependencies --no-daemon > dependencies.txt 2>&1 || true
          if grep -iE "(vulnerability|CVE|security|deprecated|unsafe)" dependencies.txt 2>/dev/null; then
            echo "Warning: Potential security issues detected"
            grep -iE "(vulnerability|CVE|security|deprecated|unsafe)" dependencies.txt | head -20
            echo "Please review dependencies.txt for details"
          else
            echo "No obvious security vulnerabilities detected"
          fi
        continue-on-error: true

  # 개발 환경 릴리즈 (refactor/v2-ci-cd 브랜치 - Docker 기반)
  # 수동으로만 실행 (workflow_dispatch)
  release-dev:
    needs: [integration]
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'release-dev' || github.event.inputs.job_to_run == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: refit-backend
        run: chmod +x gradlew

      - name: Build JAR (native amd64)
        working-directory: refit-backend
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Image Metadata
        id: meta
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          IMAGE_TAG="develop-${SHA_SHORT}"
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${IMAGE_TAG}"
          LATEST_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:develop-latest"

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "latest_image=${LATEST_IMAGE}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "Docker Image: ${FULL_IMAGE}"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: refit-backend
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ steps.meta.outputs.latest_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64

      - name: Trigger CD-Dev Workflow
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd-dev.yml',
              ref: 'refactor/v2-ci-cd',
              inputs: {
                image_tag: '${{ steps.meta.outputs.image_tag }}',
                sha: '${{ github.sha }}',
                run_id: '${{ github.run_id }}'
              }
            });
            console.log('CD-Dev workflow triggered successfully');

  # 프로덕션: refactor/v2-ci-cd 브랜치 → ECR 푸시 후 CodeDeploy로 배포 (docker-compose)
  release-prod:
    if: |
      (github.event_name == 'push' && github.ref_name == 'refactor/v2-ci-cd') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'release-prod' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: AWS 자격증명
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: JDK 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: 프로덕션 시크릿 주입
        working-directory: refit-backend
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_SECRET_YML }}" > src/main/resources/application-secret.yml

      - name: JAR 빌드
        working-directory: refit-backend
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 이미지 빌드 및 ECR 푸시
        uses: docker/build-push-action@v6
        with:
          context: refit-backend
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:production-${{ github.sha | truncate(7) }}
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:production-latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: CodeDeploy 리비전 번들 생성 및 배포
        working-directory: ${{ github.workspace }}
        env:
          S3_BUCKET: ${{ secrets.CODEDEPLOY_REVISION_BUCKET }}
          APP_NAME: ${{ secrets.CODEDEPLOY_APP_NAME }}
          DG_NAME: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}
          COMPOSE_ENV_BASE: ${{ secrets.COMPOSE_ENV_FILE }}
          IMAGE_TAG: production-${{ github.sha | truncate(7) }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -e
          # 리비전 zip: appspec, deploy.sh, docker-compose, .env
          REVISION_DIR="${GITHUB_WORKSPACE}/.codedeploy-revision"
          rm -rf "$REVISION_DIR" && mkdir -p "$REVISION_DIR"
          cp appspec.yml "$REVISION_DIR/"
          mkdir -p "$REVISION_DIR/scripts/codedeploy"
          cp scripts/codedeploy/deploy.sh "$REVISION_DIR/scripts/codedeploy/"
          cp docker-compose.yml "$REVISION_DIR/"
          # .env 파일 생성: 기본 내용 + 동적 값들
          if [ -n "$COMPOSE_ENV_BASE" ]; then
            echo "$COMPOSE_ENV_BASE" > "$REVISION_DIR/.env"
          else
            touch "$REVISION_DIR/.env"
          fi
          # 동적 값들 추가/덮어쓰기
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$REVISION_DIR/.env"
          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> "$REVISION_DIR/.env"
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> "$REVISION_DIR/.env"
          echo "AWS_REGION=${AWS_REGION}" >> "$REVISION_DIR/.env"
          ZIP_KEY="backend/${GITHUB_SHA}.zip"
          (cd "$REVISION_DIR" && zip -r -q "../${GITHUB_SHA}.zip" .)
          aws s3 cp "${GITHUB_WORKSPACE}/${GITHUB_SHA}.zip" "s3://${S3_BUCKET}/${ZIP_KEY}"
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DG_NAME" \
            --s3-location bucket="${S3_BUCKET}",key="${ZIP_KEY}",bundleType=zip \
            --query 'deploymentId' --output text)
          echo "CodeDeploy 배포 시작: $DEPLOY_ID"