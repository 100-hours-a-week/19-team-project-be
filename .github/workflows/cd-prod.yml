# 수동 재배포용: 이미 ECR에 있는 이미지 태그로 CodeDeploy만 실행 (CI 없이)
# 용도: 특정 이미지로 재배포, 롤백, 또는 CI 없이 배포만 필요할 때
name: Backend CD (Prod)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g. production-abc1234, or production-latest)'
        required: false
        type: string
      use_latest:
        description: 'Use production-latest when image_tag is not set'
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    environment: production

    steps:
      - name: Set deployment variables
        id: deploy-vars
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
            echo "Using specified image tag: ${IMAGE_TAG}"
          else
            IMAGE_TAG="production-latest"
            echo "Using production-latest"
          fi
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR
        run: |
          aws ecr describe-images \
            --repository-name ${{ secrets.ECR_REPOSITORY_BACKEND }} \
            --image-ids imageTag="${{ steps.deploy-vars.outputs.image_tag }}" \
            --region ${{ secrets.AWS_REGION }}

      - name: Create CodeDeploy revision and deploy
        id: codedeploy
        env:
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.CODEDEPLOY_REVISION_BUCKET }}
          APP_NAME: ${{ secrets.CODEDEPLOY_APP_NAME }}
          DG_NAME: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}
          RUNTIME_ENV: ${{ secrets.RUNTIME_ENV_FILE }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e
          REVISION_DIR="${GITHUB_WORKSPACE}/.codedeploy-revision"
          rm -rf "$REVISION_DIR" && mkdir -p "$REVISION_DIR"
          cp appspec.yml "$REVISION_DIR/"
          mkdir -p "$REVISION_DIR/scripts/codedeploy"
          cp scripts/codedeploy/deploy.sh "$REVISION_DIR/scripts/codedeploy/"

          envsubst '${ECR_REGISTRY} ${ECR_REPOSITORY} ${IMAGE_TAG}' \
            < docker-compose.yml > "$REVISION_DIR/docker-compose.yml"

          printf 'ECR_REGISTRY=%s\nAWS_REGION=%s\n' "${ECR_REGISTRY}" "${AWS_REGION}" \
            > "$REVISION_DIR/.env"

          printf '%s' "${RUNTIME_ENV}" > "$REVISION_DIR/refit.env"
          cp otel-agent-config.yaml "$REVISION_DIR/otel-agent-config.yaml"

          mkdir -p "$REVISION_DIR/firebase"
          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" > "$REVISION_DIR/firebase/refit-fcm.json"

          ZIP_KEY="backend/manual-$(date +%Y%m%d%H%M%S).zip"
          (cd "$REVISION_DIR" && zip -r -q "../revision.zip" .)
          aws s3 cp "${GITHUB_WORKSPACE}/revision.zip" "s3://${S3_BUCKET}/${ZIP_KEY}"
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DG_NAME" \
            --s3-location bucket="${S3_BUCKET}",key="${ZIP_KEY}",bundleType=zip \
            --query 'deploymentId' --output text)
          echo "Deployment ID: $DEPLOY_ID"
          echo "deploy_id=${DEPLOY_ID}" >> $GITHUB_OUTPUT

      - name: Wait for CodeDeploy
        id: wait-deploy
        run: |
          DEPLOY_ID="${{ steps.codedeploy.outputs.deploy_id }}"
          echo "배포 ID: $DEPLOY_ID — 폴링 시작 (최대 10분)"
          for i in $(seq 1 30); do
            STATUS=$(aws deploy get-deployment \
              --deployment-id "$DEPLOY_ID" \
              --query 'deploymentInfo.status' \
              --output text --region "${{ secrets.AWS_REGION }}")
            echo "  [$i/30] 상태: $STATUS"
            case "$STATUS" in
              Succeeded)
                echo "deploy_status=Succeeded" >> $GITHUB_OUTPUT
                exit 0 ;;
              Failed|Stopped)
                ERROR=$(aws deploy get-deployment \
                  --deployment-id "$DEPLOY_ID" \
                  --query 'deploymentInfo.errorInformation.message' \
                  --output text --region "${{ secrets.AWS_REGION }}" 2>/dev/null || echo "N/A")
                echo "deploy_status=${STATUS}" >> $GITHUB_OUTPUT
                echo "deploy_error=${ERROR}" >> $GITHUB_OUTPUT
                exit 1 ;;
            esac
            sleep 15
          done
          echo "deploy_status=Timeout" >> $GITHUB_OUTPUT
          echo "deploy_error=10분 내 완료되지 않음" >> $GITHUB_OUTPUT
          exit 1

      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          DEPLOY_ID: ${{ steps.codedeploy.outputs.deploy_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          COLOR=$([ "$STATUS" = "success" ] && echo "3066993" || echo "15158332")
          payload=$(cat <<EOF
          {"embeds":[{"title":"BE 배포(수동): $STATUS","color":$COLOR,"fields":[{"name":"이미지 태그","value":"\`$IMAGE_TAG\`","inline":true},{"name":"CodeDeploy ID","value":"\`$DEPLOY_ID\`","inline":true},{"name":"워크플로우","value":"[상세](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})","inline":false}],"footer":{"text":"Re-Fit"},"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}]}
          EOF
          )
          curl -sS -X POST -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK" || true
