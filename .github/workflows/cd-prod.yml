name: Re-Fit Backend CD (Prod)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI workflow run ID (자동 입력 또는 직접 입력)'
        required: false
        type: string
      sha:
        description: 'Commit SHA (자동 입력 또는 직접 입력)'
        required: false
        type: string
      branch:
        description: 'Branch name'
        required: true
        type: choice
        default: 'main'
        options:
          - main
      use_latest_artifact:
        description: 'run_id/sha를 입력하지 않으면 선택한 브랜치의 최신 아티팩트 사용'
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-${{ inputs.branch }}
      cancel-in-progress: false
    environment: production

    steps:
      - name: Find Latest Artifact (if needed)
        if: inputs.use_latest_artifact == true && (inputs.run_id == '' || inputs.sha == '')
        id: find-artifact
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const branch = '${{ inputs.branch }}';
            console.log(`Finding latest artifact for branch: ${branch}`);

            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: branch,
              status: 'success',
              per_page: 10
            });

            if (runs.data.workflow_runs.length === 0) {
              core.setFailed(`No successful CI runs found for branch: ${branch}`);
              return;
            }

            for (const run of runs.data.workflow_runs) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });

              const buildArtifact = artifacts.data.artifacts.find(
                a => a.name.startsWith('backend-jar-')
              );

              if (buildArtifact) {
                const sha = run.head_sha;
                console.log(`Found artifact from run #${run.run_number}`);
                console.log(`   Run ID: ${run.id}`);
                console.log(`   SHA: ${sha}`);
                console.log(`   Created: ${run.created_at}`);

                core.setOutput('run_id', run.id.toString());
                core.setOutput('sha', sha);
                core.setOutput('run_number', run.run_number.toString());
                return;
              }
            }

            core.setFailed(`No artifacts found in recent CI runs for branch: ${branch}`);

      - name: Set Deployment Variables
        id: deploy-vars
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            RUN_ID="${{ inputs.run_id }}"
          else
            RUN_ID="${{ steps.find-artifact.outputs.run_id }}"
          fi

          if [ -n "${{ inputs.sha }}" ]; then
            SHA="${{ inputs.sha }}"
          else
            SHA="${{ steps.find-artifact.outputs.sha }}"
          fi

          IMAGE_TAG="production-latest"
          [ -z "$RUN_ID" ] && { echo "run_id is empty"; exit 1; }
          [ -z "$SHA" ] && { echo "sha is empty"; exit 1; }

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.deploy-vars.outputs.branch }}

      # CI 워크플로우에서 JAR 아티팩트 다운로드
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar-${{ steps.deploy-vars.outputs.sha }}-${{ steps.deploy-vars.outputs.run_id }}
          path: build-output
          github-token: ${{ secrets.PAT }}
          run-id: ${{ steps.deploy-vars.outputs.run_id }}

      - name: Verify Downloaded JAR
        run: |
          set -euo pipefail
          JAR_NAME="refit-backend-0.0.1-SNAPSHOT.jar"
          if [ ! -f "build-output/${JAR_NAME}" ]; then
            echo "JAR file not found"
            exit 1
          fi
          FILE_SIZE=$(stat -f%z "build-output/${JAR_NAME}" 2>/dev/null || stat -c%s "build-output/${JAR_NAME}" 2>/dev/null || echo 0)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "JAR file size is too small: ${FILE_SIZE} bytes"
            exit 1
          fi
          echo "JAR file verified: ${FILE_SIZE} bytes"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # JAR 압축 후 S3에 업로드
      - name: Compress and Upload to S3
        id: s3_upload
        env:
          JAR_NAME: refit-backend-0.0.1-SNAPSHOT.jar
        run: |
          set -euo pipefail
          cd build-output
          gzip -c ${JAR_NAME} > ${JAR_NAME}.gz
          aws s3 cp ${JAR_NAME}.gz s3://${{ secrets.S3_ARTIFACTS_BUCKET }}/artifacts/backend/${JAR_NAME}.gz
          echo "s3_key=artifacts/backend/${JAR_NAME}.gz" >> $GITHUB_OUTPUT

      - name: Create CodeDeploy revision and deploy
        id: codedeploy
        env:
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.CODEDEPLOY_REVISION_BUCKET }}
          APP_NAME: ${{ secrets.CODEDEPLOY_APP_NAME }}
          DG_NAME: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}
          RUNTIME_ENV: ${{ secrets.RUNTIME_ENV_FILE }}
        run: |
          set -e
          REVISION_DIR="${GITHUB_WORKSPACE}/.codedeploy-revision"
          rm -rf "$REVISION_DIR" && mkdir -p "$REVISION_DIR"
          cp appspec.yml "$REVISION_DIR/"
          mkdir -p "$REVISION_DIR/scripts/codedeploy"
          cp scripts/codedeploy/deploy.sh "$REVISION_DIR/scripts/codedeploy/"

          envsubst '${ECR_REGISTRY} ${ECR_REPOSITORY} ${IMAGE_TAG}' \
            < docker-compose.yml > "$REVISION_DIR/docker-compose.yml"

          printf 'ECR_REGISTRY=%s\nAWS_REGION=%s\n' "${ECR_REGISTRY}" "${AWS_REGION}" \
            > "$REVISION_DIR/.env"

          printf '%s' "${RUNTIME_ENV}" > "$REVISION_DIR/refit.env"
          cp otel-agent-config.yaml "$REVISION_DIR/otel-agent-config.yaml"

          ZIP_KEY="backend/manual-$(date +%Y%m%d%H%M%S).zip"
          (cd "$REVISION_DIR" && zip -r -q "../revision.zip" .)
          aws s3 cp "${GITHUB_WORKSPACE}/revision.zip" "s3://${S3_BUCKET}/${ZIP_KEY}"
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DG_NAME" \
            --s3-location bucket="${S3_BUCKET}",key="${ZIP_KEY}",bundleType=zip \
            --query 'deploymentId' --output text)
          echo "Deployment ID: $DEPLOY_ID"
          echo "deploy_id=${DEPLOY_ID}" >> $GITHUB_OUTPUT

      - name: Wait for CodeDeploy
        id: wait-deploy
        run: |
          DEPLOY_ID="${{ steps.codedeploy.outputs.deploy_id }}"
          echo "배포 ID: $DEPLOY_ID — 폴링 시작 (최대 10분)"
          for i in $(seq 1 30); do
            STATUS=$(aws deploy get-deployment \
              --deployment-id "$DEPLOY_ID" \
              --query 'deploymentInfo.status' \
              --output text --region "${{ secrets.AWS_REGION }}")
            echo "  [$i/30] 상태: $STATUS"
            case "$STATUS" in
              Succeeded)
                echo "deploy_status=Succeeded" >> $GITHUB_OUTPUT
                exit 0 ;;
              Failed|Stopped)
                ERROR=$(aws deploy get-deployment \
                  --deployment-id "$DEPLOY_ID" \
                  --query 'deploymentInfo.errorInformation.message' \
                  --output text --region "${{ secrets.AWS_REGION }}" 2>/dev/null || echo "N/A")
                echo "deploy_status=${STATUS}" >> $GITHUB_OUTPUT
                echo "deploy_error=${ERROR}" >> $GITHUB_OUTPUT
                exit 1 ;;
            esac
            sleep 15
          done
          echo "deploy_status=Timeout" >> $GITHUB_OUTPUT
          echo "deploy_error=10분 내 완료되지 않음" >> $GITHUB_OUTPUT
          exit 1

      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          DEPLOY_ID: ${{ steps.codedeploy.outputs.deploy_id }}
        run: |
          if [ "$STATUS" = "success" ]; then
            COLOR=3066993
          else
            COLOR=15158332
          fi

          payload=$(cat <<EOF
          {"embeds":[{"title":"BE 배포(수동): $STATUS","color":$COLOR,"fields":[{"name":"이미지 태그","value":"\`$IMAGE_TAG\`","inline":true},{"name":"CodeDeploy ID","value":"\`$DEPLOY_ID\`","inline":true},{"name":"워크플로우","value":"[상세](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})","inline":false}],"footer":{"text":"Re-Fit"},"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}]}
          EOF
          )

          curl -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"
