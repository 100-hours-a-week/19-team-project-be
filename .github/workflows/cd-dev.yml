name: Re-Fit Backend CD (Dev)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., develop-abc1234)'
        required: false
        type: string
      sha:
        description: 'Commit SHA'
        required: false
        type: string
      run_id:
        description: 'CI workflow run ID'
        required: false
        type: string
      use_latest:
        description: 'image_tag를 입력하지 않으면 develop-latest 태그 사용'
        required: true
        type: boolean
        default: true

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Set Deployment Variables
        id: deploy-vars
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
            echo "📦 Using specified image tag: ${IMAGE_TAG}"
          else
            IMAGE_TAG="develop-latest"
            echo "📦 Using latest develop image"
          fi

          SHA="${{ inputs.sha }}"
          SHA_SHORT="${SHA:0:7}"

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify Image Exists in ECR
        run: |
          IMAGE_TAG="${{ steps.deploy-vars.outputs.image_tag }}"
          REPO="${{ secrets.ECR_REPOSITORY_BACKEND }}"

          aws ecr describe-images \
            --repository-name "${REPO}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --region ap-northeast-2 > /dev/null 2>&1

          if [ $? -eq 0 ]; then
            echo "✅ Image found: ${REPO}:${IMAGE_TAG}"
          else
            echo "❌ Image not found: ${REPO}:${IMAGE_TAG}"
            exit 1
          fi

      - name: Deploy to Dev Server via SSH
        uses: appleboy/ssh-action@v1
        env:
          APPLICATION_SECRET_YML: ${{ secrets.APPLICATION_SECRET_YML_DEV }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_SSH_PORT }}
          envs: APPLICATION_SECRET_YML,FIREBASE_SERVICE_ACCOUNT_JSON
          script: |
            set -euo pipefail

            echo "============================================"
            echo "Re-Fit BE 개발 서버 배포 시작: $(date)"
            echo "============================================"

            ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
            ECR_REPO="${{ secrets.ECR_REPOSITORY_BACKEND }}"
            IMAGE_TAG="${{ steps.deploy-vars.outputs.image_tag }}"
            FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
            COMPOSE_DIR="${{ secrets.DEV_COMPOSE_DIR }}"

            echo "🐳 Image: ${FULL_IMAGE}"

            # ECR 로그인
            aws ecr get-login-password --region ap-northeast-2 | \
              docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            # docker-compose.yml이 있는 디렉토리로 이동
            cd "${COMPOSE_DIR}"

            # 시크릿 설정 파일 주입
            echo "$APPLICATION_SECRET_YML" > application-secret.yml
            chmod 644 application-secret.yml
            echo "🔐 application-secret.yml 주입 완료"

            # Firebase 서비스 계정 키 주입
            mkdir -p firebase
            echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > firebase/refit-fcm.json
            chmod 644 firebase/refit-fcm.json
            echo "🔐 refit-fcm.json 주입 완료"

            # 이미지 태그를 .env 파일에 영구 저장
            ENV_FILE="${COMPOSE_DIR}/.env"
            if grep -q '^BACKEND_TAG=' "${ENV_FILE}" 2>/dev/null; then
              sed -i "s|^BACKEND_TAG=.*|BACKEND_TAG=${IMAGE_TAG}|" "${ENV_FILE}"
            else
              echo "BACKEND_TAG=${IMAGE_TAG}" >> "${ENV_FILE}"
            fi
            echo "📌 .env 파일에 BACKEND_TAG=${IMAGE_TAG} 저장 완료"

            echo "📥 Pulling new image..."
            docker compose pull backend

            echo "🔄 Restarting backend service..."
            docker compose up -d backend

            # 이전 이미지 정리
            docker image prune -f 2>/dev/null || true

            echo "============================================"
            echo "✅ Re-Fit BE 개발 서버 배포 완료: $(date)"
            echo "   Image: ${FULL_IMAGE}"
            echo "============================================"

      - name: Health Check
        run: |
          HEALTH_URL="${{ secrets.DEV_HEALTH_CHECK_URL_BACKEND }}"

          if [ -z "$HEALTH_URL" ]; then
            echo "⚠️  DEV_HEALTH_CHECK_URL_BACKEND이 설정되지 않아 헬스체크를 건너뜁니다."
            exit 0
          fi

          echo "🏥 헬스체크 시작: ${HEALTH_URL}"

          for i in {1..10}; do
            HTTP_STATUS=$(timeout 5 curl -s -o /dev/null -w "%{http_code}" "${HEALTH_URL}" 2>/dev/null || echo "000")
            if [ "${HTTP_STATUS}" = "200" ]; then
              echo "✅ 헬스체크 성공! (HTTP ${HTTP_STATUS})"
              exit 0
            fi
            echo "  ⏳ 시도 ${i}/10 - HTTP ${HTTP_STATUS}"
            [ $i -lt 10 ] && sleep 5
          done

          echo "❌ 헬스체크 실패"
          exit 1

      - name: Notify Discord - Dev Deployment Complete
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          SHA: ${{ steps.deploy-vars.outputs.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && echo "Discord webhook not configured" && exit 0

          SHA_SHORT="${SHA:0:7}"
          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "🚀 BE 개발 서버 배포 완료",
              "description": "백엔드 개발 서버 배포가 성공적으로 완료되었습니다.",
              "color": 3447003,
              "fields": [
                {"name": "서비스", "value": "Re-Fit Backend (Dev)", "inline": true},
                {"name": "이미지 태그", "value": "\`$IMAGE_TAG\`", "inline": true},
                {"name": "커밋 SHA", "value": "\`$SHA_SHORT\`", "inline": true},
                {"name": "워크플로우", "value": "[상세 보기](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)", "inline": false}
              ],
              "footer": { "text": "Re-Fit Dev Deployment System" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          curl -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"

      - name: Notify Discord on Dev Deploy Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          IMAGE_TAG: ${{ steps.deploy-vars.outputs.image_tag }}
          SHA: ${{ steps.deploy-vars.outputs.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && echo "Discord webhook not configured" && exit 0

          SHA_SHORT="${SHA:0:7}"
          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "🚨 BE 개발 서버 배포 실패",
              "description": "백엔드 개발 서버 배포가 실패했습니다. 워크플로우 로그를 확인하세요.",
              "color": 15158332,
              "fields": [
                {"name": "서비스", "value": "Re-Fit Backend (Dev)", "inline": true},
                {"name": "이미지 태그", "value": "\`$IMAGE_TAG\`", "inline": true},
                {"name": "커밋 SHA", "value": "\`$SHA_SHORT\`", "inline": true},
                {"name": "워크플로우", "value": "[상세 보기](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)", "inline": false}
              ],
              "footer": { "text": "Re-Fit Dev Deployment System" },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          curl -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK"
