spring:
  datasource:
    hikari:
      minimum-idle: 30
      maximum-pool-size: 120
      connection-timeout: 5000
      validation-timeout: 1500
      idle-timeout: 600000
      max-lifetime: 1500000
      keepalive-time: 180000
      leak-detection-threshold: 15000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jwt:
    issuer: re-fit
    access-exp-ms: 600000 # 10분
    refresh-exp-ms: 1209600000 # 2주

  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ${AWS_S3_REGION:ap-northeast-2}
      s3:
        bucket: ${AWS_S3_BUCKET:refit-storage-prod}
        domain: ${AWS_S3_DOMAIN:https://refit-storage-prod.s3.ap-northeast-2.amazonaws.com/}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:refit-backend-prod}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"

  data:
    redis:
      host: ${REDIS_HOST:refit-redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

# ============================================
# Actuator & Prometheus (운영 환경)
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness, /actuator/health/readiness 활성화
      show-details: never
    prometheus:
      enabled: true
    metrics:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
    enable:
      hikari: true
      jvm: true
      logback: true
      system: true
    tags:
      application: ${spring.application.name:refit-backend}
      environment: prod
    export:
      prometheus:
        enabled: true
      otlp:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-agent:4318}/v1/metrics
        step: 30s
        resource-attributes:
          service.name: ${spring.application.name:refit-backend}
          deployment.environment: prod
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-agent:4318}/v1/traces

# ============================================
# Structured JSON Logging (운영 환경)
# ============================================
logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name:refit-backend}
        environment: prod

  level:
    root: info
    org.springframework: warn
    org.hibernate: warn
    org.refit.refitbackend: info  # 운영 환경 기본 로그 레벨
    org.apache.kafka: warn
    org.springframework.kafka: warn

server:
  forward-headers-strategy: framework
  tomcat:
    connection-timeout: 8s
    threads:
      max: 500
      min-spare: 50
    accept-count: 800
    max-connections: 12000

fcm:
  enabled: ${FCM_ENABLED:true}
  credentials-path: classpath:firebase/refit-fcm.json
  webpush-link: ${FCM_WEBPUSH_LINK:https://re-fit.kr/}

ai:
  base-url: ${AI_BASE_URL:https://api.re-fit.kr/api/ai}

internal:
  api-key: ${INTERNAL_API_KEY:}
  api-key-header: ${INTERNAL_API_KEY_HEADER:X-Internal-Api-Key}

app:
  cache:
    enabled: ${APP_CACHE_ENABLED:true}
  notification:
    async:
      enabled: ${APP_NOTIFICATION_ASYNC_ENABLED:true}
    outbox:
      enabled: ${APP_NOTIFICATION_OUTBOX_ENABLED:true}
      batch-size: ${APP_NOTIFICATION_OUTBOX_BATCH_SIZE:100}
      publish-fixed-delay-ms: ${APP_NOTIFICATION_OUTBOX_PUBLISH_FIXED_DELAY_MS:1000}
      retry-delay-ms: ${APP_NOTIFICATION_OUTBOX_RETRY_DELAY_MS:5000}
    realtime:
      redis:
        enabled: ${APP_NOTIFICATION_REALTIME_REDIS_ENABLED:true}
        channel: notification.event.broadcast
  kafka:
    enabled: true
    topics:
      resume-parse-requested: resume.parse.requested
      report-generate-requested: report.generate.requested
      mentor-embedding-refresh-requested: mentor.embedding.refresh.requested
      resume-parse-requested-dlq: resume.parse.requested.dlq
      report-generate-requested-dlq: report.generate.requested.dlq
      mentor-embedding-refresh-requested-dlq: mentor.embedding.refresh.requested.dlq
      chat-message-sent: chat.message.sent
      notification-requested: notification.requested
      notification-requested-dlq: notification.requested.dlq
      notification-push-requested: notification.push.requested
      notification-push-requested-dlq: notification.push.requested.dlq
      chat-message-persist-requested: chat.message.persist.requested
      chat-message-persist-requested-dlq: chat.message.persist.requested.dlq
  task:
    outbox:
      enabled: ${APP_TASK_OUTBOX_ENABLED:true}
      batch-size: ${APP_TASK_OUTBOX_BATCH_SIZE:100}
      publish-fixed-delay-ms: ${APP_TASK_OUTBOX_PUBLISH_FIXED_DELAY_MS:1000}
      retry-delay-ms: ${APP_TASK_OUTBOX_RETRY_DELAY_MS:5000}
  chat:
    realtime:
      redis:
        enabled: ${APP_CHAT_REALTIME_REDIS_ENABLED:true}
        channel: chat.message.broadcast
    persistence:
      async:
        enabled: true
        batch-size: 300
        flush-interval-ms: 100
  metrics:
    aop:
      enabled: false
      slow-threshold-ms: 1000
  websocket:
    inbound:
      core-pool-size: 32
      max-pool-size: 128
      queue-capacity: 20000
    outbound:
      core-pool-size: 32
      max-pool-size: 128
      queue-capacity: 20000
    transport:
      send-time-limit-ms: 15000
      send-buffer-size-limit-bytes: 4194304
      message-size-limit-bytes: 262144
