# ============================================
# Development Environment Configuration
# ============================================
spring:
  datasource:
    hikari:
      minimum-idle: 30
      maximum-pool-size: 120
      connection-timeout: 5000
      validation-timeout: 1500
      idle-timeout: 600000
      max-lifetime: 1500000
      keepalive-time: 180000
      leak-detection-threshold: 15000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true

  jwt:
    issuer: re-fit
    access-exp-ms: 10000 # 10초
    refresh-exp-ms: 1209600000 # 2주

  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ${AWS_S3_REGION:ap-northeast-2}
      s3:
        bucket: ${AWS_S3_BUCKET:refit-storage-dev}
        domain: ${AWS_S3_DOMAIN:https://refit-storage-dev.s3.ap-northeast-2.amazonaws.com/}

  kafka:
    bootstrap-servers: kafka:9093
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: refit-backend-dev
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"

  data:
    redis:
      host: refit-redis
      port: 6379
      password:

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    persist-authorization: true
    urls:
      - name: v1
        url: /v3/api-docs/v1
      - name: v2
        url: /v3/api-docs/v2
      - name: v3
        url: /v3/api-docs/v3
  api-docs:
    enabled: true

fcm:
  enabled: true
  credentials-path: ${FCM_CREDENTIALS_PATH:./src/main/resources/firebase/refit-fcm.json}
  webpush-link: ${FCM_WEBPUSH_LINK:https://dev.re-fit.kr/}

# ============================================
# Actuator & Prometheus (개발 환경)
# ============================================
management:
  endpoints:
    enabled-by-default: true
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
    metrics:
      enabled: true
    health:
      enabled: true
    info:
      enabled: true
  metrics:
    enable:
      hikari: true
      jvm: true
      logback: true
      system: true
    tags:
      application: ${spring.application.name:refit-backend}
      environment: dev
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
    export:
      prometheus:
        enabled: true

sentry:
  enabled: true
  environment: dev
  traces-sample-rate: 0.2
  profiles-sample-rate: 0.0
  send-default-pii: false
  debug: false

# ============================================
# Structured JSON Logging (개발 환경)
# ============================================
logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name:refit-backend}
        environment: dev

  level:
    root: info
    org.springframework: info
    org.hibernate: info
    org.refit.refitbackend: info  # 개발 환경 기본 로그 레벨
    org.apache.kafka: warn
    org.springframework.kafka: warn

server:
  forward-headers-strategy: framework
  tomcat:
    connection-timeout: 8s
    threads:
      max: 400
      min-spare: 40
    accept-count: 500
    max-connections: 10000

ai:
  base-url: https://dev.re-fit.kr/api/ai

app:
  notification:
    async:
      enabled: false
    realtime:
      redis:
        enabled: true
        channel: notification.event.broadcast
  rate-limit:
    enabled: true
  kafka:
    enabled: true
    topics:
      resume-parse-requested: resume.parse.requested
      report-generate-requested: report.generate.requested
      mentor-embedding-refresh-requested: mentor.embedding.refresh.requested
      resume-parse-requested-dlq: resume.parse.requested.dlq
      report-generate-requested-dlq: report.generate.requested.dlq
      mentor-embedding-refresh-requested-dlq: mentor.embedding.refresh.requested.dlq
      chat-message-sent: chat.message.sent
      notification-requested: notification.requested
      notification-requested-dlq: notification.requested.dlq
      notification-push-requested: notification.push.requested
      notification-push-requested-dlq: notification.push.requested.dlq
      chat-message-persist-requested: chat.message.persist.requested
      chat-message-persist-requested-dlq: chat.message.persist.requested.dlq
  chat:
    realtime:
      redis:
        enabled: true
        channel: chat.message.broadcast
    persistence:
      async:
        enabled: true
        batch-size: 250
        flush-interval-ms: 120
  metrics:
    aop:
      enabled: true
      slow-threshold-ms: 500
  websocket:
    inbound:
      core-pool-size: 24
      max-pool-size: 96
      queue-capacity: 10000
    outbound:
      core-pool-size: 24
      max-pool-size: 96
      queue-capacity: 10000
    transport:
      send-time-limit-ms: 15000
      send-buffer-size-limit-bytes: 4194304
      message-size-limit-bytes: 262144
