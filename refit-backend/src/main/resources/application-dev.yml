# ============================================
# Development Environment Configuration
# ============================================
spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true

  jwt:
    issuer: re-fit
    access-exp-ms: 10000 # 10초
    refresh-exp-ms: 1209600000 # 2주

  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ${AWS_S3_REGION:ap-northeast-2}
      s3:
        bucket: ${AWS_S3_BUCKET:refit-storage-dev}
        domain: ${AWS_S3_DOMAIN:https://refit-storage-dev.s3.ap-northeast-2.amazonaws.com/}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:refit-backend-dev}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:refit-redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    persist-authorization: true
    urls:
      - name: v1
        url: /v3/api-docs/v1
      - name: v2
        url: /v3/api-docs/v2
  api-docs:
    enabled: true

fcm:
  enabled: true
  credentials-path: ${FCM_CREDENTIALS_PATH:./src/main/resources/firebase/refit-fcm.json}
  webpush-link: ${FCM_WEBPUSH_LINK:https://dev.re-fit.kr/}

# ============================================
# Actuator & Prometheus (개발 환경)
# ============================================
management:
  endpoints:
    enabled-by-default: true
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
    metrics:
      enabled: true
    health:
      enabled: true
    info:
      enabled: true
  metrics:
    enable:
      hikari: true
      jvm: true
      logback: true
      system: true
    tags:
      application: ${spring.application.name:refit-backend}
      environment: dev
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
    export:
      prometheus:
        enabled: true

# ============================================
# Structured JSON Logging (개발 환경)
# ============================================
logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name:refit-backend}
        environment: dev

  level:
    root: info
    org.springframework: info
    org.hibernate: info
    org.refit.backend: debug  # 개발 환경은 debug 레벨

server:
  forward-headers-strategy: framework

ai:
  base-url: https://dev.re-fit.kr/api/ai

app:
  kafka:
    enabled: ${APP_KAFKA_ENABLED:true}
    topics:
      resume-parse-requested: ${APP_KAFKA_TOPICS_RESUME_PARSE_REQUESTED:resume.parse.requested}
      report-generate-requested: ${APP_KAFKA_TOPICS_REPORT_GENERATE_REQUESTED:report.generate.requested}
      mentor-embedding-refresh-requested: ${APP_KAFKA_TOPICS_MENTOR_EMBEDDING_REFRESH_REQUESTED:mentor.embedding.refresh.requested}
      resume-parse-requested-dlq: ${APP_KAFKA_TOPICS_RESUME_PARSE_REQUESTED_DLQ:resume.parse.requested.dlq}
      report-generate-requested-dlq: ${APP_KAFKA_TOPICS_REPORT_GENERATE_REQUESTED_DLQ:report.generate.requested.dlq}
      mentor-embedding-refresh-requested-dlq: ${APP_KAFKA_TOPICS_MENTOR_EMBEDDING_REFRESH_REQUESTED_DLQ:mentor.embedding.refresh.requested.dlq}
      chat-message-sent: ${APP_KAFKA_TOPICS_CHAT_MESSAGE_SENT:chat.message.sent}
      chat-message-persist-requested: ${APP_KAFKA_TOPICS_CHAT_MESSAGE_PERSIST_REQUESTED:chat.message.persist.requested}
      chat-message-persist-requested-dlq: ${APP_KAFKA_TOPICS_CHAT_MESSAGE_PERSIST_REQUESTED_DLQ:chat.message.persist.requested.dlq}
  chat:
    realtime:
      redis:
        enabled: ${APP_CHAT_REALTIME_REDIS_ENABLED:true}
        channel: ${APP_CHAT_REALTIME_REDIS_CHANNEL:chat.message.broadcast}
    persistence:
      async:
        enabled: ${APP_CHAT_PERSISTENCE_ASYNC_ENABLED:true}
        batch-size: ${APP_CHAT_PERSISTENCE_ASYNC_BATCH_SIZE:100}
        flush-interval-ms: ${APP_CHAT_PERSISTENCE_ASYNC_FLUSH_INTERVAL_MS:200}
