receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  filelog/backend:
    include:
      - /var/lib/docker/containers/*/*-json.log
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      # 1) Docker json-file wrapper 파싱
      - type: json_parser
        id: parse_docker_json
        on_error: drop
        timestamp:
          parse_from: attributes.time
          layout: '%Y-%m-%dT%H:%M:%S.%LZ'

      # 2) 실제 애플리케이션 로그 본문 추출
      - type: move
        from: attributes.log
        to: body

      # 3) ECS JSON 파싱
      - type: json_parser
        id: parse_ecs_json
        on_error: drop
        parse_to: attributes
        severity:
          parse_from: attributes["log"]["level"]
          mapping:
            fatal: FATAL
            error: ERROR
            warn:  WARN
            info:  INFO
            debug: DEBUG
            trace: TRACE

      # 4) refit-backend 서비스 로그만 통과
      - type: filter
        expr: 'attributes.service == nil or attributes["service"]["name"] != "refit-backend"'

      # 5) 로그 본문/연계 필드 정규화
      - type: move
        if: attributes.message != nil
        from: attributes.message
        to: body

      - type: move
        if: attributes.traceId != nil
        from: attributes.traceId
        to: attributes["trace_id"]
      - type: move
        if: attributes.spanId != nil
        from: attributes.spanId
        to: attributes["span_id"]
      - type: move
        if: attributes.log != nil and attributes["log"]["level"] != nil
        from: attributes["log"]["level"]
        to: attributes["level"]

      # 6) 중간 필드 정리
      - type: remove
        if: attributes.log != nil
        field: attributes["log"]
      - type: remove
        if: attributes["@timestamp"] != nil
        field: attributes["@timestamp"]
      - type: remove
        if: attributes.ecs != nil
        field: attributes.ecs
      - type: remove
        if: attributes.service != nil
        field: attributes.service
      - type: remove
        if: attributes.process != nil
        field: attributes.process
      - type: remove
        if: attributes.stream != nil
        field: attributes.stream

      # 7) 고정 리소스 태그
      - type: add
        field: resource["service.name"]
        value: refit-backend
      - type: add
        field: resource["deployment.environment"]
        value: prod

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  otlp:
    endpoint: ${env:PLG_OTLP_ENDPOINT}
    tls:
      insecure: true
    headers: {}

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp]
    logs:
      receivers: [otlp, filelog/backend]
      processors: [memory_limiter, batch]
      exporters: [otlp]
