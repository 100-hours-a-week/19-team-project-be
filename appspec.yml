version: 0.0
os: linux

file_exists_behavior: OVERWRITE

files:
  - source: /
    destination: /home/ubuntu

hooks:
  BeforeInstall:
    - location: scripts/codedeploy/deploy.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/codedeploy/deploy.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/codedeploy/deploy.sh
      timeout: 600
      runas: root
  ValidateService:
    - location: scripts/codedeploy/deploy.sh
      timeout: 300
      runas: root
