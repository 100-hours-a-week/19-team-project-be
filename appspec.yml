version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu
    overwrite: true

hooks:
  BeforeInstall:
    - location: scripts/codedeploy/deploy.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/codedeploy/deploy.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/codedeploy/deploy.sh
      timeout: 600
      runas: root
  ValidateService:
    - location: scripts/codedeploy/deploy.sh
      timeout: 300
      runas: root
